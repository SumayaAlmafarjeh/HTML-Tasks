<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task4</title>
</head>
    <body>
        <h1>Fill in your information</h1>
        <form action="_blank" method="post">
            <fieldset>
                <legend>Form</legend>
                <label for="fname">First name:</label><br>
                <input type="text" id="fname" name="fname"><br>
                
                <label for="lname">Last name:</label><br>
                <input type="text" id="lname" name="lname"><br>

                <label for="email">Email:</label><br>
                <input type="text" id="email" name="email">
                <br/><br/><br/>

                <strong>Your Gender</strong> <br/><br/>
                <input type="radio" id="male">
                <label for="male">Male</label>

                <input type="radio" id="female">
                <label for="female">Female</label>

                <br/><br/>
                <strong>Favorite Subjects</strong>
                <br/><br/>
                <input type="checkbox" id="c+" >
                <label for="c+">C++</label>

                <input type="checkbox" id="jave">
                <label for="java">Java</label>

                <input type="checkbox" id="c#">
                <label for="c#">C#</label>

                <input type="checkbox" id="PHP">
                <label for="php">PHP</label>

                <input type="checkbox" id="SQL">
                <label for="SQL">SQL</label>

                <br/><br/>
                <strong>Your City</strong>
                <br/><br/>
                <label for="city">City:</label>
                <select id="city">
                    <option value="amman">Amman</option>
                    <option value="irbid" selected>Irbid</option>
                    <option value="al-tafeelah" >AL-tafeelah</option>
                    <option value="karak">AL-KARAK</option>
                </select>

                <br/><br/>
                <label for="img">Upload Image:</label>
                <input type="file" id="img">
                <br/><br/>
                <label for="extraInfo">Write About Yourself:</label><br/><br/>
                <textarea id="extraInfo" rows="4" cols="50" placeholder="Write Here"></textarea>
                <br/><br/>
                <button type="submit">Submit</button>
            </fieldset>
        </form>
    </body>

</html>

    
</html>
